<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0"/>
<title>AI Assistant — Galaxy Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── TOKENS ─────────────────────────────────── */
:root {
  --bg:           #02030a;
  --surface:      rgba(10,12,28,0.82);
  --surface2:     rgba(18,22,48,0.72);
  --border:       rgba(90,120,255,0.18);
  --accent:       #4f8eff;
  --accent2:      #9b6dff;
  --accent3:      #ff6db5;
  --text:         #dde6ff;
  --muted:        #5a6a8a;
  --user-bubble:  rgba(40,70,180,0.35);
  --bot-bubble:   rgba(10,14,40,0.72);
  --glow-blue:    rgba(79,142,255,0.5);
  --glow-purple:  rgba(155,109,255,0.5);
  --font-main:    'Outfit', sans-serif;
  --font-mono:    'Space Mono', monospace;
}

/* ─── BODY / LAYOUT ──────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  min-height: 0;
  position: relative;
}

/* ─── CANVAS STARFIELD ───────────────────────── */
#galaxy-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ─── NEBULA LAYERS ──────────────────────────── */
.nebula {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.nebula-1 {
  width: 600px; height: 500px;
  top: -120px; left: -150px;
  background: radial-gradient(circle, rgba(79,142,255,0.18) 0%, transparent 70%);
  animation: nebulaDrift 22s ease-in-out infinite alternate;
}
.nebula-2 {
  width: 500px; height: 400px;
  bottom: -100px; right: -100px;
  background: radial-gradient(circle, rgba(155,109,255,0.2) 0%, transparent 70%);
  animation: nebulaDrift 30s ease-in-out infinite alternate-reverse;
}
.nebula-3 {
  width: 400px; height: 300px;
  top: 40%; left: 40%;
  background: radial-gradient(circle, rgba(255,109,181,0.08) 0%, transparent 70%);
  animation: nebulaDrift 18s ease-in-out infinite alternate;
}

@keyframes nebulaDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.08); }
}

/* ─── GLASS LAYER ────────────────────────────── */
.glass-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}

/* ─── HEADER ─────────────────────────────────── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px);
}

.logo-orb {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 18px var(--glow-blue), 0 0 6px var(--glow-purple);
  animation: orbPulse 3s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 18px var(--glow-blue), 0 0 6px var(--glow-purple); }
  50%       { box-shadow: 0 0 32px var(--glow-blue), 0 0 18px var(--glow-purple); }
}

.brand-name {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.03em;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.status-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
}

.status-dot {
  width: 7px; height: 7px;
  background: #34d399;
  border-radius: 50%;
  box-shadow: 0 0 6px #34d399;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}

/* ─── CHAT AREA ──────────────────────────────── */
#chat {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 28px 16px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ─── WELCOME SCREEN ─────────────────────────── */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100% - 40px);
  gap: 18px;
  text-align: center;
  padding: 20px 12px 40px;
}

.welcome-orb {
  width: 80px; height: 80px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow:
    0 0 40px var(--glow-blue),
    0 0 80px rgba(155,109,255,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2);
  animation: float 5s ease-in-out infinite, orbPulse 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-14px); }
}

.welcome-names {
  font-size: clamp(18px, 4vw, 30px);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: linear-gradient(135deg, #fff 20%, var(--accent) 50%, var(--accent2) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 0 14px rgba(79,142,255,0.6));
  line-height: 1.2;
  padding: 0 8px;
}

.welcome-sub {
  font-size: clamp(11px, 2vw, 13px);
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

.divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.5;
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  max-width: 560px;
  padding: 0 8px;
}

.suggestion-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 100px;
  cursor: pointer;
  font-family: var(--font-main);
  font-size: clamp(12px, 2.5vw, 13px);
  font-weight: 400;
  white-space: nowrap;
  transition: all 0.25s ease;
  backdrop-filter: blur(12px);
}

.suggestion-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 18px rgba(79,142,255,0.25);
  transform: translateY(-2px);
}

/* ─── MESSAGES ───────────────────────────────── */
.msg-row {
  display: flex;
  gap: 12px;
  max-width: 820px;
  margin: 0 auto 16px;
  animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  align-self: flex-end;
}

.avatar.user {
  background: var(--user-bubble);
  border: 1px solid rgba(79,142,255,0.3);
}

.avatar.bot {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 0 12px var(--glow-blue);
}

.bubble {
  padding: 13px 18px;
  border-radius: 16px;
  font-size: clamp(13px, 2.5vw, 14px);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: calc(100% - 60px);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
}

.bubble.user {
  background: var(--user-bubble);
  border-radius: 16px 4px 16px 16px;
}

.bubble.bot {
  background: var(--bot-bubble);
  border-radius: 4px 16px 16px 16px;
}

/* ─── TYPING INDICATOR ───────────────────────── */
.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 14px 18px;
}

.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40%           { transform: translateY(-6px); opacity: 1; }
}

/* ─── FOOTER / INPUT ─────────────────────────── */
footer {
  flex-shrink: 0;
  padding: 14px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(24px);
}

.input-wrap {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.input-wrap:focus-within {
  border-color: rgba(79,142,255,0.5);
  box-shadow: 0 0 20px rgba(79,142,255,0.12);
}

#userInput {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font-main);
  font-size: clamp(13px, 2.5vw, 14px);
  outline: none;
  resize: none;
  max-height: 140px;
  min-height: 22px;
  line-height: 1.5;
  padding: 0;
}

#userInput::placeholder { color: var(--muted); }

#sendBtn {
  width: 40px; height: 40px;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 0 12px var(--glow-blue);
}

#sendBtn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 22px var(--glow-blue);
}

#sendBtn:active { transform: scale(0.96); }

.footer-note {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-mono);
  margin-top: 8px;
  letter-spacing: 0.08em;
}

/* ─── RESPONSIVE ─────────────────────────────── */
@media (max-width: 500px) {
  header { padding: 12px 16px; }
  #chat { padding: 20px 10px; }
  footer { padding: 12px 10px; }
  .welcome-orb { width: 64px; height: 64px; font-size: 28px; }
  .suggestions { gap: 8px; }
  .suggestion-btn { padding: 9px 14px; }
}
</style>
</head>
<body>

<!-- CANVAS STARS -->
<canvas id="galaxy-canvas"></canvas>

<!-- NEBULA -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="glass-wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-orb">✦</div>
    <div>
      <div class="brand-name">AI GALAXY</div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      ONLINE
    </div>
  </header>

  <!-- CHAT -->
  <div id="chat">
    <div id="welcome">
      <div class="welcome-orb">✦</div>
      <div class="welcome-names">Aditya Jha &amp; Vansh Aggarwal</div>
      <div class="welcome-sub">AI Assistant Project</div>
      <div class="divider"></div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="suggest(this)">What is machine learning?</button>
        <button class="suggestion-btn" onclick="suggest(this)">Explain Docker</button>
        <button class="suggestion-btn" onclick="suggest(this)">What is an API?</button>
        <button class="suggestion-btn" onclick="suggest(this)">How does AI work?</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="Message the galaxy…"></textarea>
      <button id="sendBtn" title="Send" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="footer-note">AI GALAXY · ADITYA &amp; VANSH · 2025</div>
  </footer>

</div>

<!-- SCRIPTS -->
<script>
/* ─── STARFIELD CANVAS ─────────────────────────────────────────────── */
(function () {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, stars = [], shooters = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  /* ── Build star pool ── */
  function buildStars() {
    stars = [];
    const count = Math.floor((W * H) / 6000) + 80; // density based on screen

    for (let i = 0; i < count; i++) {
      const tier = Math.random();
      let radius, baseAlpha, twinkleAmp, speed;

      if (tier < 0.55) {           // tiny background stars
        radius     = randBetween(0.6, 1.4);
        baseAlpha  = randBetween(0.4, 0.7);
        twinkleAmp = randBetween(0.05, 0.2);
        speed      = randBetween(0.005, 0.015);
      } else if (tier < 0.85) {    // mid stars
        radius     = randBetween(1.5, 2.6);
        baseAlpha  = randBetween(0.55, 0.85);
        twinkleAmp = randBetween(0.1, 0.3);
        speed      = randBetween(0.008, 0.02);
      } else {                     // large glowing stars
        radius     = randBetween(2.8, 5.0);
        baseAlpha  = randBetween(0.35, 0.6);
        twinkleAmp = randBetween(0.05, 0.15);
        speed      = randBetween(0.003, 0.01);
      }

      // colour palette: white, icy blue, soft purple
      const palette = [
        `255,255,255`,
        `200,220,255`,
        `180,200,255`,
        `210,190,255`,
        `255,240,220`
      ];
      const col = palette[Math.floor(Math.random() * palette.length)];

      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: radius,
        alpha: baseAlpha,
        baseAlpha,
        twinkleAmp,
        speed,
        phase: Math.random() * Math.PI * 2,
        col,
        glow: radius > 2.5,
      });
    }
  }

  /* ── Shooting star spawner ── */
  function spawnShooter() {
    const angle = randBetween(-0.3, 0.3) + Math.PI / 4;
    const speed = randBetween(8, 16);
    shooters.push({
      x: Math.random() * W * 1.2,
      y: Math.random() * H * 0.4 - H * 0.1,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      len: randBetween(90, 200),
      alpha: 0.9,
      life: 1,
      decay: randBetween(0.012, 0.025),
    });
  }

  setInterval(spawnShooter, 2800);

  /* ── Animation loop ── */
  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;

    /* ── Stars ── */
    stars.forEach(s => {
      s.alpha = s.baseAlpha + Math.sin(t * s.speed * 60 + s.phase) * s.twinkleAmp;
      s.alpha = Math.max(0, Math.min(1, s.alpha));

      if (s.glow) {
        // soft glow for big stars
        const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        g.addColorStop(0, `rgba(${s.col},${(s.alpha * 0.7).toFixed(2)})`);
        g.addColorStop(1, `rgba(${s.col},0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = `rgba(${s.col},${s.alpha.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });

    /* ── Shooting stars ── */
    shooters.forEach((sh, i) => {
      sh.life -= sh.decay;
      const a = sh.life * 0.85;

      const gx1 = sh.x - sh.vx * (sh.len / sh.vx || 1);
      const gy1 = sh.y - sh.vy * (sh.len / sh.vy || 1);

      const grad = ctx.createLinearGradient(gx1, gy1, sh.x, sh.y);
      grad.addColorStop(0, `rgba(200,220,255,0)`);
      grad.addColorStop(0.7, `rgba(200,220,255,${(a * 0.6).toFixed(2)})`);
      grad.addColorStop(1, `rgba(255,255,255,${a.toFixed(2)})`);

      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(gx1, gy1);
      ctx.lineTo(sh.x, sh.y);
      ctx.stroke();

      // tiny glow head
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(sh.x, sh.y, 1.5, 0, Math.PI * 2);
      ctx.fill();

      sh.x += sh.vx;
      sh.y += sh.vy;

      if (sh.life <= 0) shooters.splice(i, 1);
    });

    requestAnimationFrame(draw);
  }

  resize();
  buildStars();
  draw();

  window.addEventListener('resize', () => { resize(); buildStars(); });
})();

/* ─── TEXTAREA AUTO-GROW ─────────────────────────────────────────── */
const inputEl = document.getElementById('userInput');
inputEl.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* ─── CHAT LOGIC ─────────────────────────────────────────────────── */
const chatEl = document.getElementById('chat');

function suggest(btn) {
  inputEl.value = btn.textContent;
  inputEl.dispatchEvent(new Event('input'));
  sendMessage();
}

function appendMsg(role, content) {
  // Remove welcome screen on first message
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'user' ? '👤' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = content;

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;

  return { row, bubble };
}

function showTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble bot typing-dots';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  appendMsg('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
    });

    const data = await res.json();
    removeTyping();
    appendMsg('bot', data.reply);
  } catch (err) {
    removeTyping();
    appendMsg('bot', '⚠ Could not reach the server. Please try again.');
  }
}
</script>

</body>
</html>
