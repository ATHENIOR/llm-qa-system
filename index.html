<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0d0f14;
  --surface:#14171f;
  --surface2:#1c202c;
  --border:#252a38;
  --accent:#5b8dee;
  --accent2:#7c6af7;
  --user-bg:#1e2a4a;
  --bot-bg:#161a24;
  --text:#e8eaf0;
  --muted:#6b7280;
}

/* 🌌 STARS LAYER 1 */
body::before {
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background-image:
    radial-gradient(2px 2px at 20% 30%, #fff, transparent),
    radial-gradient(2px 2px at 80% 40%, #fff, transparent),
    radial-gradient(1px 1px at 50% 70%, #aaa, transparent),
    radial-gradient(1px 1px at 10% 90%, #fff, transparent),
    radial-gradient(2px 2px at 90% 10%, #ccc, transparent);
  animation: starsMove 80s linear infinite;
  z-index:-2;
}

/* 🌌 STARS LAYER 2 */
body::after {
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background-image:
    radial-gradient(1px 1px at 30% 20%, #fff, transparent),
    radial-gradient(1px 1px at 70% 60%, #aaa, transparent),
    radial-gradient(2px 2px at 40% 80%, #fff, transparent);
  animation: starsMove 120s linear infinite reverse;
  z-index:-1;
  opacity:0.5;
}

@keyframes starsMove {
  from { transform: translateY(0); }
  to   { transform: translateY(-200px); }
}

/* ☁️ CLOUD LAYER */
#welcome::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:0;
  left:-50%;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05), transparent 40%);
  animation: clouds 40s linear infinite;
  z-index:-1;
}

@keyframes clouds {
  from { transform: translateX(0); }
  to   { transform: translateX(200px); }
}

body {
  font-family:'Sora', sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header {
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.logo {
  width:36px; height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
}

.brand h1 { font-size:15px; }
.brand p { font-size:11px; color:var(--muted); }

.status-dot {
  margin-left:auto;
  width:8px; height:8px;
  background:#34d399;
  border-radius:50%;
}

/* CHAT */
#chat { flex:1; overflow-y:auto; padding:28px 0; }

/* MESSAGE */
.msg-row {
  display:flex;
  gap:14px;
  padding:10px 24px;
  max-width:860px;
  margin:0 auto;
  animation: fadeUp .3s ease, scaleIn .2s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

@keyframes scaleIn {
  from {transform:scale(0.95);}
  to {transform:scale(1);}
}

.avatar {
  width:34px; height:34px;
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
}

.avatar.user { background:var(--user-bg); }
.avatar.bot { background:linear-gradient(135deg,var(--accent),var(--accent2)); }

.bubble {
  padding:13px 17px;
  border-radius:14px;
  font-size:14px;
  white-space:pre-wrap;
}

.bubble.user { background:var(--user-bg); }
.bubble.bot { background:var(--bot-bg); }

/* WELCOME */
#welcome {
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  gap:12px;
  text-align:center;
}

.big-logo {
  width:64px; height:64px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

#welcome h2 {
  font-size:34px;
  background:linear-gradient(135deg,#5b8dee,#7c6af7);
  -webkit-background-clip:text;
  color:transparent;
  text-shadow:0 0 20px rgba(91,141,238,0.5);
}

/* BUTTONS */
.suggestion-btn {
  background:var(--surface2);
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:20px;
  cursor:pointer;
}

.suggestion-btn:hover {
  border-color:var(--accent);
  color:var(--accent);
}

/* INPUT */
footer {
  padding:16px;
  background:var(--surface);
}

.input-wrap {
  max-width:860px;
  margin:auto;
  display:flex;
  gap:10px;
  background:var(--surface2);
  border-radius:14px;
  padding:10px;
}

#userInput {
  flex:1;
  background:transparent;
  border:none;
  color:var(--text);
  outline:none;
}

#sendBtn {
  width:38px; height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">🤖</div>
  <div class="brand">
    <h1>AI Assistant</h1>
    <p>Powered by GPT</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div id="welcome">
    <div class="big-logo">✦</div>

    <h2>ADITYA JHA & VANSH AGGARWAL</h2>
    <p style="color:#6b7280;">AI Assistant Project</p>

    <div>
      <button class="suggestion-btn" onclick="suggest(this)">What is machine learning?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Explain Docker</button>
      <button class="suggestion-btn" onclick="suggest(this)">What is an API?</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Message..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</footer>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('userInput');
let history = [];

function suggest(btn) {
  inputEl.value = btn.textContent;
  sendMessage();
}

function appendMsg(role, content) {
  document.getElementById('welcome')?.remove();

  const row = document.createElement('div');
  row.className = 'msg-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'user' ? '👤' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = content;

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  appendMsg('user', text);
  inputEl.value = '';

  const res = await fetch('/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages:[{role:'user', content:text}]})
  });

  const data = await res.json();
  appendMsg('bot', data.reply);
}
</script>

</body>
</html>
