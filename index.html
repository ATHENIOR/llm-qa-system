<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0d0f14;
  --surface:#14171f;
  --surface2:#1c202c;
  --border:#252a38;
  --accent:#5b8dee;
  --accent2:#7c6af7;
  --user-bg:#1e2a4a;
  --bot-bg:#161a24;
  --text:#e8eaf0;
  --muted:#6b7280;
  --glow:rgba(91,141,238,0.18);
}

/* 🌌 Animated Background */
body::before {
  content:"";
  position:fixed;
  top:-50%; left:-50%;
  width:200%; height:200%;
  background:
    radial-gradient(circle at 30% 30%, #5b8dee33, transparent 40%),
    radial-gradient(circle at 70% 70%, #7c6af733, transparent 40%);
  animation: moveBg 12s linear infinite;
  z-index:-1;
}

@keyframes moveBg {
  0%{transform:translate(0,0);}
  50%{transform:translate(10%,10%);}
  100%{transform:translate(0,0);}
}

body {
  font-family:'Sora', sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Header */
header {
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.logo {
  width:36px; height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 16px var(--glow);
}

.brand h1 { font-size:15px; }
.brand p { font-size:11px; color:var(--muted); }

.status-dot {
  margin-left:auto;
  width:8px; height:8px;
  background:#34d399;
  border-radius:50%;
  box-shadow:0 0 8px #34d399;
}

/* Chat */
#chat { flex:1; overflow-y:auto; padding:28px 0; }

.msg-row {
  display:flex;
  gap:14px;
  padding:10px 24px;
  max-width:860px;
  margin:0 auto;
  animation: fadeUp .3s ease, scaleIn .2s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(8px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes scaleIn {
  from {transform:scale(0.95); opacity:0;}
  to {transform:scale(1); opacity:1;}
}

/* Welcome */
#welcome {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  gap:12px;
  text-align:center;
}

.big-logo {
  width:64px; height:64px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  box-shadow:0 0 32px var(--glow);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* NAME STYLE */
#welcome h2 {
  font-size:32px;
  font-weight:700;
  background:linear-gradient(135deg,#5b8dee,#7c6af7);
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(91,141,238,0.4);
}

/* Buttons */
.suggestion-btn {
  background:var(--surface2);
  border:1px solid var(--border);
  padding:9px 16px;
  border-radius:20px;
  cursor:pointer;
  transition:.2s;
}
.suggestion-btn:hover {
  border-color:var(--accent);
  color:var(--accent);
}

/* Footer */
footer {
  padding:16px;
  background:var(--surface);
  border-top:1px solid var(--border);
}

.input-wrap {
  max-width:860px;
  margin:auto;
  display:flex;
  gap:10px;
  background:var(--surface2);
  border-radius:14px;
  padding:10px;
}

#userInput {
  flex:1;
  background:transparent;
  border:none;
  color:var(--text);
}

#sendBtn {
  width:38px; height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🤖</div>
  <div class="brand">
    <h1>AI Assistant</h1>
    <p>Powered by GPT</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div id="welcome">
    <div class="big-logo">✦</div>

    <h2>ADITYA JHA & VANSH AGGARWAL</h2>
    <p style="color:#6b7280;">AI Assistant Project</p>

    <p>Ask me anything — I'm here to help.</p>

    <div>
      <button class="suggestion-btn" onclick="suggest(this)">What is AI?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Explain Docker</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Message..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</footer>

<script>
async function sendMessage() {
  const input = document.getElementById("userInput");
  alert("Backend connected ✔");
}
</script>

</body>
</html>
