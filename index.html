<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#000814;
  --surface:#14171f;
  --accent:#5b8dee;
  --accent2:#7c6af7;
  --text:#e8eaf0;
}

/* 🌌 BASE BACKGROUND */
body{
  font-family:'Sora',sans-serif;
  background: radial-gradient(circle at bottom,#001233,#000);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 🌌 GALAXY STAR FIELD (BIG STARS ONLY) */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;

  background-image:

  /* ⭐ BIG STARS */
  radial-gradient(6px 6px at 10% 20%, rgba(255,255,255,0.6), transparent),
  radial-gradient(6px 6px at 20% 60%, rgba(255,255,255,0.5), transparent),
  radial-gradient(6px 6px at 30% 40%, rgba(255,255,255,0.6), transparent),
  radial-gradient(6px 6px at 40% 80%, rgba(255,255,255,0.5), transparent),
  radial-gradient(6px 6px at 50% 10%, rgba(255,255,255,0.6), transparent),
  radial-gradient(6px 6px at 60% 50%, rgba(255,255,255,0.5), transparent),
  radial-gradient(6px 6px at 70% 30%, rgba(255,255,255,0.6), transparent),
  radial-gradient(6px 6px at 80% 70%, rgba(255,255,255,0.5), transparent),
  radial-gradient(6px 6px at 90% 20%, rgba(255,255,255,0.6), transparent),

  /* ⭐ MEDIUM STARS */
  radial-gradient(4px 4px at 15% 80%, rgba(255,255,255,0.9), transparent),
  radial-gradient(4px 4px at 25% 10%, rgba(255,255,255,0.85), transparent),
  radial-gradient(4px 4px at 35% 60%, rgba(255,255,255,0.9), transparent),
  radial-gradient(4px 4px at 45% 30%, rgba(255,255,255,0.85), transparent),
  radial-gradient(4px 4px at 55% 90%, rgba(255,255,255,0.9), transparent),
  radial-gradient(4px 4px at 65% 20%, rgba(255,255,255,0.85), transparent),
  radial-gradient(4px 4px at 75% 50%, rgba(255,255,255,0.9), transparent),
  radial-gradient(4px 4px at 85% 40%, rgba(255,255,255,0.85), transparent),

  /* ⭐ FILL LAYER */
  radial-gradient(3px 3px at 12% 34%, #fff, transparent),
  radial-gradient(3px 3px at 22% 14%, #fff, transparent),
  radial-gradient(3px 3px at 32% 74%, #fff, transparent),
  radial-gradient(3px 3px at 42% 44%, #fff, transparent),
  radial-gradient(3px 3px at 52% 84%, #fff, transparent),
  radial-gradient(3px 3px at 62% 24%, #fff, transparent),
  radial-gradient(3px 3px at 72% 64%, #fff, transparent),
  radial-gradient(3px 3px at 82% 14%, #fff, transparent),
  radial-gradient(3px 3px at 92% 74%, #fff, transparent);

  animation: moveStars 100s linear infinite, twinkle 4s ease-in-out infinite alternate;
  z-index:-2;
}

@keyframes moveStars{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);}
}

@keyframes twinkle{
  from{opacity:0.6;}
  to{opacity:1;}
}

/* 🌠 SHOOTING STARS */
.shooting-star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  box-shadow:0 0 10px white;
  animation:shoot 6s linear infinite;
}

.shooting-star::after{
  content:"";
  position:absolute;
  width:80px;
  height:2px;
  background:linear-gradient(90deg,white,transparent);
  transform:translateX(-80px);
}

@keyframes shoot{
  0%{transform:translate(-100px,-100px);opacity:1;}
  100%{transform:translate(800px,500px);opacity:0;}
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  padding:14px 24px;
  background:var(--surface);
}

.logo{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}

.status-dot{
  margin-left:auto;
  width:8px;height:8px;
  background:#34d399;border-radius:50%;
}

/* CENTER */
#welcome{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:12px;
}

.big-logo{
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  50%{transform:translateY(-15px);}
}

#welcome h2{
  font-size:34px;
  background:linear-gradient(135deg,#5b8dee,#7c6af7);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTONS */
button{
  padding:10px 16px;
  border-radius:20px;
  border:1px solid #333;
  background:#1c202c;
  color:white;
  cursor:pointer;
}

/* INPUT */
footer{
  padding:16px;
  background:#14171f;
}

.input-wrap{
  display:flex;
  gap:10px;
  max-width:800px;
  margin:auto;
}

textarea{
  flex:1;
  background:#1c202c;
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
}

#sendBtn{
  width:40px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  border-radius:10px;
  color:white;
}

/* CHAT */
#chat{flex:1;overflow:auto;}

.msg-row{display:flex;gap:10px;padding:10px;}
.bubble{padding:10px;border-radius:10px;}
.user{background:#1e2a4a;}
.bot{background:#161a24;}

</style>
</head>

<body>

<!-- 🌠 Shooting stars -->
<div class="shooting-star" style="top:10%;left:20%;"></div>
<div class="shooting-star" style="top:30%;left:60%;animation-delay:2s;"></div>
<div class="shooting-star" style="top:70%;left:10%;animation-delay:4s;"></div>

<header>
<div class="logo">🤖</div>
<div class="status-dot"></div>
</header>

<div id="chat">
<div id="welcome">
<div class="big-logo">✦</div>
<h2>ADITYA JHA & VANSH AGGARWAL</h2>
<p>AI Assistant Project</p>

<div>
<button onclick="suggest(this)">What is ML?</button>
<button onclick="suggest(this)">Explain Docker</button>
<button onclick="suggest(this)">What is API?</button>
</div>
</div>
</div>

<footer>
<div class="input-wrap">
<textarea id="userInput"></textarea>
<button id="sendBtn" onclick="sendMessage()">➤</button>
</div>
</footer>

<script>
const chatEl=document.getElementById('chat');
const input=document.getElementById('userInput');

function suggest(b){
input.value=b.innerText;
sendMessage();
}

function add(role,text){
document.getElementById('welcome')?.remove();
const row=document.createElement('div');
row.className='msg-row';
const b=document.createElement('div');
b.className='bubble '+role;
b.innerText=text;
row.appendChild(b);
chatEl.appendChild(row);
}

async function sendMessage(){
const t=input.value.trim();
if(!t)return;
add('user',t);
input.value='';
const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:t}]})});
const d=await r.json();
add('bot',d.reply);
}
</script>

</body>
</html>
