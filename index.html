<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #14171f;
    --surface2:  #1c202c;
    --border:    #252a38;
    --accent:    #5b8dee;
    --accent2:   #7c6af7;
    --user-bg:   #1e2a4a;
    --bot-bg:    #161a24;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --glow:      rgba(91,141,238,0.18);
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px var(--glow);
  }
  .brand h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .brand p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .status-dot {
    margin-left: auto;
    width: 8px; height: 8px;
    background: #34d399;
    border-radius: 50%;
    box-shadow: 0 0 8px #34d399;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50%      { opacity:.4; }
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 14px;
    padding: 10px 24px;
    max-width: 860px;
    margin: 0 auto;
    animation: fadeUp .25s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 9px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    margin-top: 2px;
  }
  .avatar.user { background: var(--user-bg); border: 1px solid #2a3a6a; }
  .avatar.bot  {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px var(--glow);
  }

  .bubble {
    max-width: calc(100% - 48px);
    padding: 13px 17px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.75;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .bubble.user {
    background: var(--user-bg);
    border: 1px solid #2a3a6a;
    border-top-left-radius: 4px;
  }
  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0c12;
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 12.5px;
    color: #7dd3fc;
  }

  /* ── Typing indicator ── */
  .typing-dots {
    display: flex; gap: 5px; align-items: center; padding: 6px 0;
  }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay:.2s; }
  .typing-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); }
    30%          { transform:translateY(-6px); }
  }

  /* ── Welcome screen ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 24px;
  }
  #welcome .big-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    box-shadow: 0 0 32px var(--glow);
    margin-bottom: 8px;
  }
  #welcome h2 { font-size: 22px; font-weight: 600; color: var(--text); }
  #welcome p  { font-size: 14px; max-width: 380px; line-height: 1.6; }
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-top: 12px;
  }
  .suggestion-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all .2s;
  }
  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(91,141,238,.08);
  }

  /* ── Input bar ── */
  footer {
    padding: 16px 24px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrap {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px 10px 16px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    resize: none;
    line-height: 1.6;
    max-height: 140px;
    overflow-y: auto;
  }
  #userInput::placeholder { color: var(--muted); }
  #sendBtn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .1s;
    box-shadow: 0 2px 12px var(--glow);
  }
  #sendBtn:hover  { opacity:.9; }
  #sendBtn:active { transform: scale(.93); }
  #sendBtn:disabled { opacity:.35; cursor:not-allowed; }
  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    max-width: 860px;
    margin-left: auto; margin-right: auto;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div class="brand">
    <h1>AI Assistant</h1>
    <p>Powered by GPT-3.5 Turbo</p>
  </div>
  <div class="status-dot" title="Online"></div>
</header>

<div id="chat">
  <div id="welcome">
    <div class="big-logo">✦</div>
    <h2 style="   font-size:32px;   font-weight:700;   background: linear-gradient(135deg, #5b8dee, #7c6af7);   background-clip: text;   -webkit-background-clip: text;   color: transparent;   -webkit-text-fill-color: transparent; ">   ADITYA JHA & VANSH AGARWAL </h2>  <p style="font-size:15px; color:#6b7280;">   AI Assistant Project </p>
    <p>Ask me anything — I'm here to provide clear, helpful answers on any topic.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="suggest(this)">What is machine learning?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Explain Docker in simple terms</button>
      <button class="suggestion-btn" onclick="suggest(this)">Write a Python hello world</button>
      <button class="suggestion-btn" onclick="suggest(this)">What is an API?</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Message AI Assistant…"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">Press Enter to send · Shift+Enter for new line</p>
</footer>

<script>
  const chatEl    = document.getElementById('chat');
  const inputEl   = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const welcomeEl = document.getElementById('welcome');

  let history = [];   // {role, content}[]
  let busy    = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function suggest(btn) {
    inputEl.value = btn.textContent;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  function appendMsg(role, content) {
    if (welcomeEl) welcomeEl.remove();

    const row = document.createElement('div');
    row.className = 'msg-row';

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = content;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        appendMsg('bot', `⚠️ Error: ${data.detail || 'Something went wrong.'}`);
      } else {
        appendMsg('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      removeTyping();
      appendMsg('bot', '⚠️ Could not reach the server. Is it running?');
    }

    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
